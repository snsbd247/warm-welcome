name: "🎨 Frontend CI — React"

on:
  push:
    branches: [main, develop, staging]
    paths:
      - "src/**"
      - "package.json"
      - "vite.config.ts"
      - "tsconfig*.json"
      - ".github/workflows/ci-frontend.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "src/**"
      - "package.json"

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint & Type Check ────────────────────────────────
  lint:
    name: "🔍 ESLint & TypeScript"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint check
        run: npx eslint src/ --ext .ts,.tsx --max-warnings=50 || true

  # ─── Unit Tests ───────────────────────────────────────
  test:
    name: "🧪 Vitest Unit Tests"
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: |
          npx vitest run --coverage --reporter=verbose --reporter=junit --outputFile=reports/test-results.xml 2>/dev/null || \
          npx vitest run --reporter=verbose || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: reports/
          retention-days: 30

  # ─── Build Check ──────────────────────────────────────
  build:
    name: "📦 Production Build"
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for cPanel
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Build for VPS
        run: |
          VITE_DEPLOY_TARGET=vps npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Check build output
        run: |
          echo "=== Build size ==="
          du -sh dist/
          echo "=== Asset count ==="
          find dist/assets -type f | wc -l
          echo "=== Largest files ==="
          find dist -type f -exec du -h {} + | sort -rh | head -10

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist/
          retention-days: 7

  # ─── Security Scan ────────────────────────────────────
  security:
    name: "🔒 npm Audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high || true

      - name: Check for secrets in code
        run: |
          echo "=== Checking for hardcoded secrets ==="
          grep -rn "sk_live\|sk_test\|AKIA\|password.*=.*['\"]" src/ \
            --include="*.ts" --include="*.tsx" \
            --exclude-dir=node_modules \
            | grep -v "password.*=.*['\"]\"\"" \
            | grep -v "// " \
            | grep -v "type\|interface\|placeholder" \
            || echo "✅ No hardcoded secrets found"
