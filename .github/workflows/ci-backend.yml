name: "🔧 Backend CI — Laravel"

on:
  push:
    branches: [main, develop, staging]
    paths:
      - "ISP-Backend/**"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "ISP-Backend/**"

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_VERSION: "8.2"
  DB_CONNECTION: mysql
  DB_HOST: 127.0.0.1
  DB_PORT: 3306
  DB_DATABASE: isp_test
  DB_USERNAME: root
  DB_PASSWORD: password

jobs:
  # ─── Lint & Static Analysis ───────────────────────────
  lint:
    name: "🔍 PHPStan & Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ISP-Backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, pdo_mysql, bcmath, gd, zip
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ISP-Backend/vendor
          key: composer-${{ hashFiles('ISP-Backend/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPStan (Level 5)
        run: |
          if [ -f phpstan.neon ]; then
            vendor/bin/phpstan analyse --memory-limit=512M --no-progress
          else
            vendor/bin/phpstan analyse app --level=5 --memory-limit=512M --no-progress || true
          fi

      - name: Check PSR-12 coding standards
        run: |
          if [ -f vendor/bin/pint ]; then
            vendor/bin/pint --test || true
          fi

  # ─── Security Scan ────────────────────────────────────
  security:
    name: "🔒 Security Audit"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ISP-Backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Composer audit
        run: composer audit --format=plain || true

      - name: Check for known vulnerabilities
        run: |
          composer require --dev enlightn/security-checker 2>/dev/null || true
          if [ -f vendor/bin/security-checker ]; then
            vendor/bin/security-checker security:check composer.lock
          fi

  # ─── Unit & Feature Tests ─────────────────────────────
  test:
    name: "🧪 PHPUnit Tests"
    runs-on: ubuntu-latest
    needs: [lint]
    defaults:
      run:
        working-directory: ISP-Backend

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: isp_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, pdo_mysql, bcmath, gd, zip, redis
          tools: composer:v2
          coverage: xdebug

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ISP-Backend/vendor
          key: composer-${{ hashFiles('ISP-Backend/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env 2>/dev/null || true
          php artisan key:generate --force
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=isp_test" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=password" >> .env
          echo "CACHE_DRIVER=array" >> .env
          echo "QUEUE_CONNECTION=sync" >> .env
          echo "SESSION_DRIVER=array" >> .env

      - name: Run migrations
        run: php artisan migrate --force --no-interaction

      - name: Seed test data
        run: |
          php artisan db:seed --class=DefaultSeeder --force 2>/dev/null || true
          php artisan db:seed --class=GeoSeeder --force 2>/dev/null || true

      - name: Run Unit Tests
        run: |
          php artisan test --testsuite=Unit \
            --log-junit=reports/unit-results.xml \
            --coverage-clover=reports/coverage-unit.xml \
            || true

      - name: Run Feature Tests
        run: |
          php artisan test --testsuite=Feature \
            --log-junit=reports/feature-results.xml \
            --coverage-clover=reports/coverage-feature.xml \
            || true

      - name: Run Full Test Suite with Coverage
        run: |
          php artisan test \
            --log-junit=reports/test-results.xml \
            --coverage-clover=reports/coverage.xml \
            --coverage-html=reports/coverage-html

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: ISP-Backend/reports/
          retention-days: 30

      - name: Coverage summary comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: backend-coverage
          message: |
            ## 🧪 Backend Test Results
            📊 Coverage report uploaded as artifact
            🔗 Check the Actions tab for full details

  # ─── API Integration Tests ────────────────────────────
  api-test:
    name: "🌐 API Integration Tests"
    runs-on: ubuntu-latest
    needs: [test]
    defaults:
      run:
        working-directory: ISP-Backend

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: isp_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, pdo_mysql, bcmath, gd, zip
          tools: composer:v2

      - name: Install & prepare
        run: |
          composer install --no-interaction --prefer-dist --no-progress
          cp .env.example .env 2>/dev/null || true
          php artisan key:generate --force
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_DATABASE=isp_test" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=password" >> .env
          php artisan migrate --force
          php artisan db:seed --class=DefaultSeeder --force 2>/dev/null || true

      - name: Start Laravel server
        run: |
          php artisan serve --port=8000 &
          sleep 5

      - name: Run API smoke tests
        run: |
          echo "=== Health Check ==="
          curl -sf http://localhost:8000/api/health || echo "No health endpoint"

          echo "=== Super Admin Login ==="
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST http://localhost:8000/api/super-admin/login \
            -H "Content-Type: application/json" \
            -d '{"email":"superadmin","password":"Admin@123"}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Status: $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Super Admin login OK"
            TOKEN=$(echo "$BODY" | jq -r '.token // empty')
            if [ -n "$TOKEN" ]; then
              echo "=== Test authenticated endpoint ==="
              curl -sf -H "Authorization: Bearer $TOKEN" http://localhost:8000/api/super-admin/tenants || echo "Tenants endpoint test"
            fi
          else
            echo "⚠️ Login returned $HTTP_CODE (may need seeding)"
          fi
